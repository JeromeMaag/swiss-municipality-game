{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Register" %} | {% trans "Find the municipality!" %}{% endblock %}

{% block content %}
  <section class="auth-panel">
    <h1>{% trans "Register" %}</h1>
    <form method="post" class="auth-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">{% trans "Register" %}</button>
    </form>
    <p class="auth-note">
      {% trans "Already registered?" %} <a href="{% url 'accounts:login' %}">{% trans "Login" %}</a>.
    </p>
  </section>
{% endblock %}
