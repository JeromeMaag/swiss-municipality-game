{% extends "base.html" %}

{% block title %}Register | GemeindeGuess CH{% endblock %}

{% block content %}
  <section class="auth-panel">
    <h1>Register</h1>
    <form method="post" class="auth-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Register</button>
    </form>
    <p class="auth-note">
      Already registered? <a href="{% url 'accounts:login' %}">Login</a>.
    </p>
  </section>
{% endblock %}
