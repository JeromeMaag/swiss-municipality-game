{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Login" %} | {% trans "Find the municipality!" %}{% endblock %}

{% block content %}
  <section class="auth-panel">
    <h1>{% trans "Login" %}</h1>
    <form method="post" class="auth-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">{% trans "Login" %}</button>
    </form>
    <p class="auth-note">
      {% trans "No account yet?" %} <a href="{% url 'accounts:register' %}">{% trans "Register" %}</a>.
    </p>
  </section>
{% endblock %}
