name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  django:
    name: Django checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: gemeindeguess
          POSTGRES_USER: gemeindeguess
          POSTGRES_PASSWORD: gemeindeguess
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gemeindeguess -d gemeindeguess"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      DATABASE_URL: postgis://gemeindeguess:gemeindeguess@localhost:5432/gemeindeguess

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system geospatial libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Django checks
        run: python manage.py check

      - name: Check migration files
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        run: python manage.py test
